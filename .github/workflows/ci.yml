name: CI

on:
  push:
    branches:
      - main
      - staging
      - dev
      - "feature/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - staging
      - dev
      - "feature/**"
      - "hotfix/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Validate environment variable shape
        run: ./scripts/env_check.sh
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "anon-placeholder"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "service-role-placeholder"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          OPENAI_API_KEY: "sk-placeholder"
          OPENAI_MODEL: "gpt-4.1-mini"
          AUTOMATION_CRON_SECRET: "automation-secret-placeholder"
          CRON_SECRET: "automation-secret-placeholder"

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "anon-placeholder"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "service-role-placeholder"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          OPENAI_API_KEY: "sk-placeholder"
